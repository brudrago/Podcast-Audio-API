services:
  postgres:
    image: postgres:16
    container_name: podcast-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: podcast_db
      POSTGRES_USER: podcast_user
      POSTGRES_PASSWORD: podcast_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: